<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auden Landscape Architecture | Premium Garden & Park Design Studio</title>
    <meta
      name="description"
      content="Auden Landscape Architecture crafts bespoke residential gardens, public parks, and architectural landscapes. Specializing in natural stone, water features, and spatial harmony since 2014."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="{{SITE_URL}}" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Google Fonts (preconnect + swap to avoid render blocking) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Auden Landscape Architecture | Premium Garden & Park Design Studio"
    />
    <meta
      property="og:description"
      content="Bespoke residential gardens, public parks, and architectural landscapes crafted to evolve gracefully through generations."
    />
    <meta property="og:url" content="{{SITE_URL}}" />
    <meta
      property="og:image"
      content="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?auto=format&fit=crop&w=1200&q=80"
    />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Auden Landscape Architecture" />
    <meta
      name="twitter:description"
      content="Bespoke residential gardens, public parks, and architectural landscapes."
    />
    <meta
      name="twitter:image"
      content="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?auto=format&fit=crop&w=1200&q=80"
    />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "name": "Auden Landscape Architecture",
        "description": "Premium landscape architecture and design studio specializing in residential gardens, public parks, and architectural landscaping.",
        "url": "{{SITE_URL}}",
        "telephone": "+1-555-0147",
        "email": "studio@example.com",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "123 Garden Lane, Suite 100",
          "addressLocality": "San Francisco",
          "addressRegion": "CA",
          "postalCode": "94107",
          "addressCountry": "US"
        },
        "foundingDate": "2014",
        "sameAs": [
          "https://instagram.com/audenlandscape",
          "https://pinterest.com/audenlandscape",
          "https://linkedin.com/company/audenlandscape"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
